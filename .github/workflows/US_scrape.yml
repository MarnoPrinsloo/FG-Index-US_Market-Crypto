name: Daily CNN US Market Fear & Greed Scrape

on:
  schedule:
    - cron: "0 21 * * 1-5"  # 4:00 PM ET (21:00 UTC), weekdays only
  workflow_dispatch:          # allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit the CSV back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install fear-greed

      - name: Run us_market_scraper
        run: python us_market_scrape.py

      - name: Commit and push CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/us_market_fear_greed.csv
          git diff --cached --quiet || git commit -m "chore: update fear & greed index $(date +'%Y-%m-%d')"
          git push
