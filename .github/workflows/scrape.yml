name: Daily Fear & Greed Scrape

on:
  schedule:
    - cron: "15 14 * * 1-5"  # 9:15 AM ET (14:15 UTC), weekdays only
  workflow_dispatch:          # allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit the CSV back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install fear-greed requests

      - name: Run scraper
        run: python scrape.py

      - name: Commit and push CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update fear & greed index $(date +'%Y-%m-%d')"
          git push
